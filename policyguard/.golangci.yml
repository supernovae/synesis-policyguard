version: "2"

run:
  tests: true
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - unparam

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false
  govet:
    enable-all: true
    disable:
      - fieldalignment

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
        - govet
    - path: internal/policy/loader_test\.go
      linters:
        - unused
  max-issues-per-linter: 50
  max-same-issues: 10

severity:
  default-severity: error
